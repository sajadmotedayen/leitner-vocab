<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جعبه لایتنر | یادگیری لغات انگلیسی</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#22303f;
    --ink-soft:#5b6b7a;
    --parchment:#f6efe0;
    --parchment-dark:#ecdfc2;
    --panel:#fffaf0;
    --brass:#ab8446;
    --brass-dark:#8a6a35;
    --sage:#66845f;
    --sage-dark:#4f6b49;
    --rust:#b3564f;
    --rust-dark:#953f39;
    --line:#d8c9a3;
    --shadow: 0 8px 24px rgba(34,48,63,.12);
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(1200px 800px at 20% -10%, #fffdf6 0%, var(--parchment) 45%, #ede0c3 100%);
    color:var(--ink);
    font-family:'Vazirmatn', sans-serif;
    min-height:100vh;
    padding-bottom:60px;
  }
  .en{ font-family:'Lora', serif; }
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}

  /* ===== Header ===== */
  header{
    padding:28px 20px 18px;
    text-align:center;
    position:relative;
  }
  header .eyebrow{
    font-size:12px;
    letter-spacing:.12em;
    color:var(--brass-dark);
    font-weight:600;
    text-transform:uppercase;
  }
  header h1{
    margin:6px 0 4px;
    font-size:30px;
    font-weight:800;
    color:var(--ink);
  }
  header p{
    margin:0;
    color:var(--ink-soft);
    font-size:14px;
  }

  .wrap{max-width:920px;margin:0 auto;padding:0 16px;}

  /* ===== Cabinet (signature element) ===== */
  .cabinet{
    background: linear-gradient(180deg, #7a5a34, #5f4527);
    border-radius: 18px;
    padding:18px 16px 22px;
    box-shadow: var(--shadow), inset 0 0 0 2px rgba(255,255,255,.04);
    margin: 18px 0 22px;
  }
  .cabinet-top{
    display:flex; justify-content:space-between; align-items:center;
    color:#f3e6c8; padding:2px 8px 14px;
  }
  .cabinet-top .today{
    font-size:13px; opacity:.9;
  }
  .cabinet-top .due-badge{
    background:var(--rust);
    color:#fff8ef;
    padding:6px 14px;
    border-radius:999px;
    font-size:13px;
    font-weight:700;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
  }
  .drawers{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .drawer{
    background: linear-gradient(180deg, #eaddbb, #ddcda1);
    border-radius:10px;
    padding:12px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow: 0 3px 0 rgba(0,0,0,.15), inset 0 1px 0 rgba(255,255,255,.5);
    border:1px solid #c9b57e;
    cursor:pointer;
    transition:transform .15s ease;
    position:relative;
  }
  .drawer:hover{ transform: translateX(-3px); }
  .drawer .handle{
    width:34px; height:8px; border-radius:6px;
    background: linear-gradient(180deg, var(--brass), var(--brass-dark));
    box-shadow:0 1px 2px rgba(0,0,0,.4);
  }
  .drawer .label{
    display:flex; align-items:center; gap:10px;
    font-weight:700; color:var(--ink);
    font-size:14px;
  }
  .drawer .interval{
    font-size:11px; color:var(--ink-soft); font-weight:500;
  }
  .drawer .counts{
    display:flex; align-items:center; gap:8px;
  }
  .chip{
    background:#fff; border:1px solid var(--line);
    border-radius:999px; padding:3px 10px; font-size:12px; font-weight:700;
    color:var(--ink-soft);
  }
  .chip.due{ background:var(--rust); color:#fff; border-color:var(--rust-dark); }
  .drawer.mastered{
    background: linear-gradient(180deg, #dfe9dc, #cfe0ca);
    border-color:#a9c2a1;
  }

  /* ===== Action buttons ===== */
  .actions{
    display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:24px;
  }
  .btn{
    border:none; border-radius:12px; padding:13px 20px;
    font-weight:700; font-size:14px;
    display:flex; align-items:center; gap:8px;
    box-shadow: var(--shadow);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover{ transform: translateY(-2px); }
  .btn:active{ transform: translateY(0); }
  .btn-primary{ background: linear-gradient(180deg, var(--sage), var(--sage-dark)); color:#fdfaf0; }
  .btn-secondary{ background:var(--panel); color:var(--ink); border:1px solid var(--line); }
  .btn-ghost{ background:transparent; color:var(--ink-soft); box-shadow:none; border:1px dashed var(--line); }
  .btn-small{ padding:8px 12px; font-size:12px; border-radius:9px; }
  .btn:disabled{ opacity:.45; cursor:not-allowed; transform:none; }

  /* ===== Panels / Modal ===== */
  .overlay{
    position:fixed; inset:0; background:rgba(34,48,63,.45);
    display:flex; align-items:flex-end; justify-content:center;
    z-index:50; backdrop-filter: blur(2px);
  }
  @media(min-width:640px){ .overlay{ align-items:center; } }
  .panel{
    background:var(--panel);
    width:100%; max-width:560px;
    border-radius: 20px 20px 0 0;
    padding:22px 20px 26px;
    box-shadow:0 -10px 40px rgba(0,0,0,.25);
    max-height:88vh; overflow-y:auto;
    animation: slideup .22s ease;
  }
  @media(min-width:640px){ .panel{ border-radius:20px; } }
  @keyframes slideup{ from{ transform:translateY(24px); opacity:0;} to{transform:translateY(0); opacity:1;} }
  .panel-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .panel-head h2{ margin:0; font-size:18px; }
  .close-x{ background:none; border:none; font-size:20px; color:var(--ink-soft); box-shadow:none; padding:4px 8px;}

  label{ display:block; font-size:13px; font-weight:600; color:var(--ink-soft); margin:14px 0 6px; }
  input[type=text], textarea{
    width:100%; border:1px solid var(--line); border-radius:10px;
    padding:11px 12px; font-family:inherit; font-size:14px; background:#fffef9; color:var(--ink);
  }
  input.en, textarea.en{ font-family:'Lora', serif; direction:ltr; text-align:left; }
  textarea{ min-height:70px; resize:vertical; }

  /* ===== Flashcard ===== */
  .card{
    background:var(--panel);
    border-radius:20px;
    padding:26px 22px;
    box-shadow:var(--shadow);
    border:1px solid var(--line);
    position:relative;
    margin-bottom:16px;
  }
  .card .box-tag{
    position:absolute; top:16px; left:16px;
    font-size:11px; color:var(--brass-dark); font-weight:700;
    background:#f5e9cb; padding:4px 10px; border-radius:999px;
  }
  .card .word{
    font-size:34px; font-weight:600; text-align:center; color:var(--ink);
    margin:18px 0 6px; direction:ltr;
  }
  .card .sub{ text-align:center; color:var(--ink-soft); font-size:13px; margin-bottom:18px; }

  .linkrow{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:18px; }
  .link-btn{
    text-decoration:none; font-size:12.5px; font-weight:700;
    padding:8px 13px; border-radius:9px;
    display:inline-flex; align-items:center; gap:6px;
    border:1px solid var(--line); background:#fffef9; color:var(--ink);
  }
  .link-btn:hover{ background:var(--parchment-dark); }
  .dot{ width:7px; height:7px; border-radius:50%; }

  .reveal-box{
    border-top:1px dashed var(--line); margin-top:6px; padding-top:16px;
  }
  .fa-meaning{ font-size:19px; font-weight:700; text-align:center; margin-bottom:8px; }
  .example{ background:var(--parchment-dark); border-radius:10px; padding:10px 14px; font-size:13.5px; color:var(--ink-soft); margin-bottom:10px; }
  .example .en{ display:block; margin-bottom:2px; color:var(--ink); }

  .note-area{ margin-top:6px; }

  .grade-row{ display:flex; gap:10px; margin-top:18px; }
  .grade-row .btn{ flex:1; justify-content:center; }

  .empty{
    text-align:center; padding:50px 20px; color:var(--ink-soft);
  }
  .empty .big{ font-size:40px; margin-bottom:10px; }

  /* ===== Word list ===== */
  .list-item{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; display:flex; justify-content:space-between; align-items:center;
    margin-bottom:8px;
  }
  .list-item .li-word{ font-family:'Lora',serif; font-weight:600; font-size:16px; direction:ltr; }
  .list-item .li-fa{ font-size:12.5px; color:var(--ink-soft); }
  .li-actions{ display:flex; gap:6px; }
  .icon-btn{ background:transparent; border:none; box-shadow:none; font-size:15px; padding:6px; color:var(--ink-soft); }
  .search-input{ margin-bottom:14px; }

  /* ===== AI assistant ===== */
  .ai-msg{ background:var(--parchment-dark); border-radius:12px; padding:12px 14px; font-size:13.5px; line-height:1.9; margin-bottom:10px; white-space:pre-wrap;}
  .ai-msg.user{ background:#e4ecdf; }
  .ai-note{
    font-size:12px; color:var(--ink-soft); background:#f5e9cb; border-radius:10px; padding:10px 12px; margin-bottom:14px; line-height:1.9;
  }
  .spinner{ display:inline-block; width:14px; height:14px; border:2px solid var(--line); border-top-color:var(--brass); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg);} }

  footer{ text-align:center; color:var(--ink-soft); font-size:11.5px; margin-top:30px; }

  /* ===== Free browse — fullscreen ===== */
  .browse-full{
    position:fixed; inset:0; z-index:40;
    background: radial-gradient(1200px 800px at 20% -10%, #fffdf6 0%, var(--parchment) 45%, #ede0c3 100%);
    display:flex; flex-direction:column;
    height:100dvh;
  }
  .browse-top{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px 4px; flex-shrink:0;
  }
  .browse-top .browse-counter{ font-size:13px; font-weight:700; color:var(--ink-soft); }
  .browse-top .close-x{ font-size:22px; padding:6px 10px; }
  .browse-body{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:10px 22px; text-align:center; overflow-y:auto; min-height:0;
  }
  .browse-body .box-tag{
    font-size:11px; color:var(--brass-dark); font-weight:700;
    background:#f5e9cb; padding:4px 10px; border-radius:999px; margin-bottom:18px;
  }
  .browse-word{ font-size:40px; font-weight:600; color:var(--ink); direction:ltr; margin-bottom:10px; word-break:break-word; }
  .browse-meaning{ font-size:21px; font-weight:700; color:var(--ink); margin-bottom:10px; }
  .browse-example{ background:var(--parchment-dark); border-radius:10px; padding:10px 14px; font-size:13.5px; color:var(--ink-soft); max-width:420px; }
  .browse-example .en{ display:block; margin-bottom:2px; color:var(--ink); }
  .browse-note-toggle{ margin-top:14px; }
  .browse-bottom{
    flex-shrink:0; padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; gap:10px;
  }
  .browse-nav{ display:flex; gap:10px; }
  .browse-nav .btn{ flex:1; justify-content:center; }
  .browse-tools-row{ display:flex; gap:10px; }
  .browse-tools-row .btn{ flex:1; justify-content:center; }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Leitner System</div>
  <h1>جعبه لایتنر لغات</h1>
  <p>یادگیری هوشمند لغات انگلیسی با تکرار زمان‌بندی‌شده</p>
</header>

<div class="wrap">

  <div class="cabinet">
    <div class="cabinet-top">
      <span class="today" id="todayLabel"></span>
      <span class="due-badge" id="dueBadge">۰ کلمه برای مرور</span>
    </div>
    <div class="drawers" id="drawers"></div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="startReviewBtn">▶ شروع مرور امروز</button>
    <button class="btn btn-secondary" id="addWordBtn">+ افزودن لغت جدید</button>
    <button class="btn btn-secondary" id="listBtn">فهرست همه لغات</button>
    <button class="btn btn-secondary" id="browseBtn">📖 مرور آزاد لغات</button>
    <button class="btn btn-ghost" id="settingsBtn">⚙ تنظیمات هوش مصنوعی</button>
    <button class="btn btn-ghost" id="githubSyncBtn">☁ همگام‌سازی گیت‌هاب</button>
  </div>

  <div id="main"></div>

</div>

<footer>ساخته‌شده برای مرور روزمره لغات — داده‌ها فقط روی همین مرورگر شما ذخیره می‌شود.</footer>

<script>
const BOX_INTERVALS = {1:1, 2:2, 3:4, 4:7, 5:15}; // days
const BOX_LABELS = {1:'جعبه ۱ — روزانه',2:'جعبه ۲ — هر ۲ روز',3:'جعبه ۳ — هر ۴ روز',4:'جعبه ۴ — هر ۷ روز',5:'جعبه ۵ — هر ۱۵ روز'};
const STORAGE_KEY = 'leitner-words-v1';

let words = [];

const $ = sel => document.querySelector(sel);
const mainEl = $('#main');

function todayISO(){ return new Date().toISOString(); }
function addDays(date, days){ const d = new Date(date); d.setDate(d.getDate()+days); return d.toISOString(); }
function fmtDate(iso){
  try{ return new Date(iso).toLocaleDateString('fa-IR', {month:'short', day:'numeric'}); }catch(e){ return ''; }
}

async function loadWords(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    words = raw ? JSON.parse(raw) : [];
  }catch(e){
    console.error('خواندن داده‌ها ناموفق بود', e);
    words = [];
  }
  // If GitHub sync is configured, try to pull the latest version from the repo
  const sync = loadGithubSync();
  if(sync.repo && sync.token){
    try{
      const remote = await githubFetchFile(sync);
      if(remote){
        words = remote.words;
        githubSha = remote.sha;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(words)); // keep an offline cache
      }
    }catch(e){
      console.error('دریافت از گیت‌هاب ناموفق بود، از نسخه محلی استفاده می‌شود', e);
    }
  }
}

let githubPushTimer = null;
async function saveWords(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
  }catch(e){
    console.error('ذخیره‌سازی ناموفق بود', e);
    alert('ذخیره‌سازی با مشکل مواجه شد. ممکن است حافظه مرورگر پر باشد.');
  }
  const sync = loadGithubSync();
  if(sync.repo && sync.token){
    clearTimeout(githubPushTimer);
    githubPushTimer = setTimeout(()=> pushToGithub(sync), 2000); // debounce so rapid edits become one commit
  }
}

/* ---------- GitHub sync (stores the word list in a file inside your own repo) ---------- */
const GITHUB_SYNC_KEY = 'leitner-github-sync-v1';
let githubSha = null;
function loadGithubSync(){
  try{
    const raw = localStorage.getItem(GITHUB_SYNC_KEY);
    return raw ? JSON.parse(raw) : {repo:'', path:'leitner-words-data.json', branch:'main', token:''};
  }catch(e){ return {repo:'', path:'leitner-words-data.json', branch:'main', token:''}; }
}
function saveGithubSync(s){
  try{ localStorage.setItem(GITHUB_SYNC_KEY, JSON.stringify(s)); }catch(e){}
}
function utf8ToBase64(str){ return btoa(unescape(encodeURIComponent(str))); }
function base64ToUtf8(str){ return decodeURIComponent(escape(atob(str))); }

async function githubFetchFile(sync){
  const url = `https://api.github.com/repos/${sync.repo}/contents/${encodeURIComponent(sync.path)}?ref=${encodeURIComponent(sync.branch||'main')}`;
  const res = await fetch(url, {
    headers:{ 'Authorization':'token '+sync.token, 'Accept':'application/vnd.github+json' }
  });
  if(res.status===404) return null; // file doesn't exist yet — that's fine, first save will create it
  if(!res.ok) throw new Error('HTTP '+res.status);
  const data = await res.json();
  const parsed = JSON.parse(base64ToUtf8(data.content));
  return { words: parsed, sha: data.sha };
}

async function pushToGithub(sync, retry){
  try{
    const url = `https://api.github.com/repos/${sync.repo}/contents/${encodeURIComponent(sync.path)}`;
    const body = {
      message: `بروزرسانی لغت‌ها (${words.length} لغت) — ${new Date().toLocaleString('fa-IR')}`,
      content: utf8ToBase64(JSON.stringify(words, null, 2)),
      branch: sync.branch||'main'
    };
    if(githubSha) body.sha = githubSha;
    const res = await fetch(url, {
      method:'PUT',
      headers:{ 'Authorization':'token '+sync.token, 'Accept':'application/vnd.github+json', 'Content-Type':'application/json' },
      body: JSON.stringify(body)
    });
    if(res.status===409 && !retry){
      // someone/something else updated the file — refetch the sha once and retry
      const fresh = await githubFetchFile(sync);
      if(fresh) githubSha = fresh.sha;
      return pushToGithub(sync, true);
    }
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    githubSha = data.content.sha;
    updateSyncStatus('آخرین همگام‌سازی: ' + new Date().toLocaleTimeString('fa-IR'));
  }catch(e){
    console.error('ارسال به گیت‌هاب ناموفق بود', e);
    updateSyncStatus('همگام‌سازی ناموفق بود — بررسی کن توکن و اتصال اینترنت درست باشد.');
  }
}

function updateSyncStatus(text){
  const el = document.getElementById('syncStatusLine');
  if(el) el.textContent = text;
}

function openGithubSyncPanel(){
  const s = loadGithubSync();
  const overlay = document.createElement('div');
  overlay.className='overlay';
  overlay.innerHTML = `
    <div class="panel">
      <div class="panel-head">
        <h2>☁ همگام‌سازی با گیت‌هاب</h2>
        <button class="close-x">✕</button>
      </div>
      <div class="ai-note">
        با این کار، لغت‌هایت به‌جای فقط ماندن روی این مرورگر، توی یک فایل داخل مخزن گیت‌هاب خودت ذخیره می‌شوند — پس از هر دستگاه/مرورگری که این تنظیمات را وارد کنی، همان لغت‌ها را می‌بینی.<br><br>
        <b>ساخت توکن:</b> برو به github.com → روی عکس پروفایلت → Settings → پایین صفحه Developer settings → Personal access tokens → Fine-grained tokens → Generate new token. دسترسی (Permissions) این مخزن را روی «Contents: Read and write» بگذار.
      </div>
      <label>نام کاربری/مخزن (مثال: username/leitner-vocab)</label>
      <input type="text" class="en" id="g-repo" placeholder="username/leitner-vocab" value="${escapeHtml(s.repo||'')}">
      <label>نام برنچ</label>
      <input type="text" class="en" id="g-branch" placeholder="main" value="${escapeHtml(s.branch||'main')}">
      <label>مسیر فایل داده (نیازی به تغییر نیست)</label>
      <input type="text" class="en" id="g-path" value="${escapeHtml(s.path||'leitner-words-data.json')}">
      <label>توکن دسترسی (Personal Access Token)</label>
      <input type="text" class="en" id="g-token" placeholder="github_pat_..." value="${escapeHtml(s.token||'')}">
      <div id="syncStatusLine" style="font-size:12px;color:var(--ink-soft);margin-top:8px;"></div>
      <div class="actions" style="margin-top:16px;">
        <button class="btn btn-primary" id="g-save">ذخیره و همگام‌سازی</button>
        <button class="btn btn-ghost" id="g-disconnect">قطع اتصال</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.close-x').onclick = ()=> overlay.remove();
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };

  overlay.querySelector('#g-save').onclick = async ()=>{
    const newSync = {
      repo: overlay.querySelector('#g-repo').value.trim().replace(/^https?:\/\/github\.com\//,'').replace(/\/$/,''),
      branch: overlay.querySelector('#g-branch').value.trim() || 'main',
      path: overlay.querySelector('#g-path').value.trim() || 'leitner-words-data.json',
      token: overlay.querySelector('#g-token').value.trim()
    };
    if(!newSync.repo || !newSync.token){ alert('نام مخزن و توکن را وارد کن.'); return; }
    saveGithubSync(newSync);
    updateSyncStatus('در حال بررسی اتصال...');
    try{
      const remote = await githubFetchFile(newSync);
      if(remote){
        words = remote.words;
        githubSha = remote.sha;
        await saveWordsLocalOnly();
        renderDrawers();
        updateSyncStatus('متصل شد ✓ لغت‌های موجود در گیت‌هاب بارگذاری شد.');
      } else {
        githubSha = null;
        await pushToGithub(newSync);
        updateSyncStatus('متصل شد ✓ فایل جدید در مخزن ساخته شد.');
      }
    }catch(e){
      updateSyncStatus('اتصال ناموفق بود: ' + e.message + ' — نام مخزن یا توکن را بررسی کن.');
    }
  };
  overlay.querySelector('#g-disconnect').onclick = ()=>{
    saveGithubSync({repo:'', path:'leitner-words-data.json', branch:'main', token:''});
    githubSha = null;
    overlay.remove();
  };
}
async function saveWordsLocalOnly(){

}

function isDue(w){
  if(w.box === 6) return false; // mastered/archived
  return new Date(w.nextReview) <= new Date();
}

function renderDrawers(){
  const drawersEl = $('#drawers');
  drawersEl.innerHTML = '';
  const now = new Date();
  let totalDue = 0;

  for(let b=1;b<=5;b++){
    const inBox = words.filter(w=>w.box===b);
    const due = inBox.filter(isDue).length;
    totalDue += due;
    const div = document.createElement('div');
    div.className='drawer';
    div.innerHTML = `
      <div class="label"><span class="handle"></span>${BOX_LABELS[b]}</div>
      <div class="counts">
        <span class="chip">${inBox.length} کلمه</span>
        ${due>0?`<span class="chip due">${due} امروز</span>`:''}
      </div>`;
    div.onclick = ()=> startReview(b);
    drawersEl.appendChild(div);
  }
  const mastered = words.filter(w=>w.box===6);
  const md = document.createElement('div');
  md.className='drawer mastered';
  md.innerHTML = `
    <div class="label"><span class="handle"></span>🏆 بایگانی مسلط‌شده‌ها</div>
    <div class="counts"><span class="chip">${mastered.length} کلمه</span></div>`;
  md.onclick = ()=> renderList(6);
  drawersEl.appendChild(md);

  $('#dueBadge').textContent = totalDue>0 ? `${totalDue} کلمه برای مرور` : 'مرور امروز تمام شد ✓';
  $('#todayLabel').textContent = new Date().toLocaleDateString('fa-IR', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
}

function renderList(filterBox){

  mainEl.innerHTML = `
    <div class="card">

      <div class="actions" style="margin-bottom:14px;">

      </div>
      <div id="listItems"></div>
      <div class="actions" id="selectionBar" style="margin-top:14px; display:none;">
        <button class="btn btn-primary btn-small" id="exportSelectedBtn">📋 خروجی از انتخاب‌شده‌ها برای هوش مصنوعی</button>
      </div>
      <div style="border-top:1px dashed var(--line); margin-top:20px; padding-top:16px;">
        <label style="margin-top:0;">پشتیبان‌گیری</label>
        <div class="actions">
          <button class="btn btn-secondary btn-small" id="backupBtn">⬇ دانلود پشتیبان کامل (JSON)</button>
          <button class="btn btn-secondary btn-small" id="restoreBtn">⬆ بازیابی از فایل پشتیبان</button>
          <input type="file" id="restoreFile" accept="application/json" style="display:none;">
        </div>
      </div>
    </div>`;

  const draw = ()=>{
    const query = ($('#searchInput').value||'').toLowerCase();
    let list = words;
    if(filterBox) list = list.filter(w=>w.box===filterBox);
    if(query) list = list.filter(w=> w.en.toLowerCase().includes(query) || w.fa.includes(query));
    list.sort((a,b)=> new Date(b.createdAt)-new Date(a.createdAt));
    const box = $('#listItems');
    if(list.length===0){
      box.innerHTML = `<div class="empty">هنوز لغتی پیدا نشد.</div>`;
    } else {
      box.innerHTML = list.map(w=>`
        <div class="list-item">
          <label style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer;">
            <input type="checkbox" data-select="${w.id}" ${selectedIds.has(w.id)?'checked':''} style="width:18px;height:18px;">
            <div>
              <div class="li-word">${escapeHtml(w.en)}</div>
              <div class="li-fa">${escapeHtml(w.fa)} · ${w.box===6?'مسلط‌شده':'جعبه '+w.box+' · مرور بعدی: '+fmtDate(w.nextReview)}</div>
            </div>
          </label>
          <div class="li-actions">
            <button class="icon-btn" data-browse="${w.id}" title="مرور تکی این لغت">👁</button>
            <button class="icon-btn" data-edit="${w.id}">✎</button>
          </div>
        </div>`).join('');
      box.querySelectorAll('[data-edit]').forEach(btn=>{
        btn.onclick = ()=> openAddForm(words.find(w=>w.id===btn.dataset.edit));
      });
      box.querySelectorAll('[data-browse]').forEach(btn=>{
        btn.onclick = ()=>{
          const list = [...box.querySelectorAll('[data-browse]')].map(b=>words.find(w=>w.id===b.dataset.browse));
          const startIdx = list.findIndex(w=>w.id===btn.dataset.browse);
          startBrowse(list, startIdx);
        };
      });
      box.querySelectorAll('[data-select]').forEach(cb=>{
        cb.onchange = ()=>{
          if(cb.checked) selectedIds.add(cb.dataset.select);
          else selectedIds.delete(cb.dataset.select);
          updateSelectionBar();
        };
      });
    }
    updateSelectionBar();
  };

  function updateSelectionBar(){
    const bar = $('#selectionBar');
    if(!bar) return;
    bar.style.display = selectedIds.size>0 ? 'flex' : 'none';
    const btn = $('#exportSelectedBtn');
    if(btn) btn.textContent = `📋 خروجی از ${selectedIds.size} لغت انتخاب‌شده برای هوش مصنوعی`;
  }

  $('#searchInput').oninput = draw;
  $('#selectAllBtn').onclick = ()=>{
    let list = words;
    if(filterBox) list = list.filter(w=>w.box===filterBox);
    list.forEach(w=> selectedIds.add(w.id));
    draw();
  };
  $('#clearSelectBtn').onclick = ()=>{ selectedIds.clear(); draw(); };
  $('#exportSelectedBtn').onclick = ()=> openExportPanel(words.filter(w=>selectedIds.has(w.id)));
  $('#backupBtn').onclick = downloadBackup;
  $('#restoreBtn').onclick = ()=> $('#restoreFile').click();
  $('#restoreFile').onchange = handleRestoreFile;

  draw();
}

/* ---------- Full backup (download / restore JSON) ---------- */
function downloadBackup(){
  const blob = new Blob([JSON.stringify(words, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `leitner-backup-${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function handleRestoreFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async ()=>{
    try{
      const restored = JSON.parse(reader.result);
      if(!Array.isArray(restored)) throw new Error('فرمت فایل معتبر نیست');
      const choice = confirm('برای بازیابی: OK بزن تا لغت‌های فایل به لغت‌های فعلی اضافه شوند (بدون حذف چیزی). برای جایگزینی کامل به‌جای افزودن، Cancel بزن و در پنجره بعدی تایید کن.');
      if(choice){
        const existingIds = new Set(words.map(w=>w.id));
        restored.forEach(w=>{ if(!existingIds.has(w.id)) words.push(w); });
      } else {
        if(confirm('مطمئنی؟ این کار تمام لغت‌های فعلی را با محتوای فایل جایگزین می‌کند و قابل بازگشت نیست.')){
          words = restored;
        } else {
          return;
        }
      }
      await saveWords();
      renderDrawers();
      renderList();
      alert('بازیابی با موفقیت انجام شد.');
    }catch(err){
      alert('فایل معتبر نبود یا مشکلی پیش آمد: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- Unified card view ---------- */
/* Both "today's review" and "free browse" use the exact same fullscreen card UI
   and the exact same logic. The only difference is which words are in the deck
   (due cards only vs. everything) and what happens once a card is graded:
   in review mode a graded card is done for this session and drops out of the
   deck; in browse mode grading just records progress and moves to the next card. */
let deck = [];
let deckIndex = 0;
let deckRevealed = false;
let deckMode = 'browse'; // 'review' | 'browse'
let deckEl = null;
let touchStartX = null, touchStartY = null;

function startReview(box){
  const list = words.filter(w => (box ? w.box===box : true) && isDue(w));
  list.sort(()=>Math.random()-0.5);
  if(list.length===0){
    mainEl.dataset.view='review';
    mainEl.innerHTML = `<div class="card empty"><div class="big">🎉</div>مرور این بخش برای الان تمام شده. کارت جدیدی برای نمایش نیست.</div>`;
    return;
  }
  openDeck(list, {mode:'review'});
}

function startBrowse(list, startIndex){
  if(!list){
    // no list passed in -> browse everything, sorted alphabetically
    list = [...words].sort((a,b)=> a.en.localeCompare(b.en));
  }
  if(list.length===0){
    alert('لغتی برای مرور وجود ندارد.');
    return;
  }
  openDeck(list, {mode:'browse', startIndex});
}

function openDeck(list, opts){
  opts = opts || {};
  deck = list;
  deckIndex = (typeof opts.startIndex==='number' && opts.startIndex>=0) ? opts.startIndex : 0;
  deckRevealed = false;
  deckMode = opts.mode || 'browse';

  deckEl = document.createElement('div');
  deckEl.className = 'browse-full';
  document.body.appendChild(deckEl);
  document.addEventListener('keydown', deckKeyHandler);
  deckEl.addEventListener('touchstart', deckTouchStart, {passive:true});
  deckEl.addEventListener('touchend', deckTouchEnd, {passive:true});
  renderDeckCard();
}

function closeDeck(){
  if(deckEl){ deckEl.remove(); deckEl = null; }
  document.removeEventListener('keydown', deckKeyHandler);
  if(deckMode==='review') renderDrawers();
}

function deckKeyHandler(e){
  if(e.key==='Escape') closeDeck();
  else if(e.key==='ArrowRight') deckGo(-1); // RTL: right arrow = previous
  else if(e.key==='ArrowLeft') deckGo(1);
  else if(e.key===' '){ e.preventDefault(); deckRevealed = !deckRevealed; renderDeckCard(); }
}

function deckTouchStart(e){
  if(e.touches.length!==1) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}
function deckTouchEnd(e){
  if(touchStartX===null) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  touchStartX = null; touchStartY = null;
  if(Math.abs(dx) < 55 || Math.abs(dx) < Math.abs(dy)*1.5) return; // not a clear horizontal swipe
  // RTL layout: swipe right-to-left = next card, swipe left-to-right = previous card
  if(dx < 0) deckGo(1); else deckGo(-1);
}

function deckGo(dir){
  const next = deckIndex + dir;
  if(next<0 || next>=deck.length) return;
  deckIndex = next;
  deckRevealed = false;
  renderDeckCard();
}

function currentDeckWord(){ return deck[deckIndex]; }

async function deckGrade(passed){
  const w = currentDeckWord();
  if(!w) return;
  if(!w.history) w.history=[];
  w.history.push({date: todayISO(), passed});
  if(passed){
    if(w.box>=5){
      w.box = 6; // mastered/archive
      w.nextReview = null;
    } else {
      w.box += 1;
      w.nextReview = addDays(new Date(), BOX_INTERVALS[w.box]);
    }
  } else {
    w.box = 1;
    w.nextReview = addDays(new Date(), BOX_INTERVALS[1]);
  }
  await saveWords();
  deckRevealed = false;

  if(deckMode==='review'){
    // این کارت برای همین نوبت مرور انجام شد، پس دیگر لازم نیست دوباره نشان داده شود
    deck.splice(deckIndex, 1);
    if(deckIndex >= deck.length) deckIndex = Math.max(0, deck.length-1);
    if(deck.length===0){ renderDeckFinished(); return; }
  } else if(deckIndex < deck.length-1){
    deckIndex += 1;
  }
  renderDeckCard();
}

function renderDeckFinished(){
  if(!deckEl) return;
  renderDrawers();
  deckEl.innerHTML = `
    <div class="browse-top">
      <span class="browse-counter">مرور امروز</span>
      <button class="close-x" id="deckCloseBtn">✕</button>
    </div>
    <div class="browse-body">
      <div style="font-size:44px;margin-bottom:10px;">✅</div>
      <div>همه کارت‌های این نوبت مرور شدند. آفرین!</div>
    </div>
    <div class="browse-bottom">
      <button class="btn btn-primary" id="deckFinishBtn">بازگشت</button>
    </div>
  `;
  deckEl.querySelector('#deckCloseBtn').onclick = closeDeck;
  deckEl.querySelector('#deckFinishBtn').onclick = closeDeck;
}

function renderDeckCard(){
  if(!deckEl) return;
  const w = currentDeckWord();
  if(!w) return;
  const enQ = encodeURIComponent(w.en);
  const isReview = deckMode==='review';
  deckEl.innerHTML = `
    <div class="browse-top">
      <span class="browse-counter">${isReview ? 'مرور امروز · ' : ''}${w.box===6?'مسلط‌شده':'جعبه '+w.box} · ${deckIndex+1} از ${deck.length}</span>
      <button class="close-x" id="deckCloseBtn">✕</button>
    </div>
    <div class="browse-body">
      <div class="box-tag">${isReview ? 'مرور امروز — طبق زمان‌بندی' : 'مرور آزاد'}</div>
      <div class="browse-word en">${escapeHtml(w.en)}</div>
      ${deckRevealed ? `
        <div class="browse-meaning">${escapeHtml(w.fa)}</div>
        ${w.example ? `<div class="browse-example"><span class="en">${escapeHtml(w.example)}</span></div>` : ''}
      ` : `
        <button class="btn btn-secondary" id="deckRevealBtn">نمایش معنی</button>
      `}
      ${deckRevealed ? `<button class="btn btn-ghost btn-small browse-note-toggle" id="deckNoteToggle">📝 یادداشت${w.note?' (دارد)':''}</button>` : ''}
      <div id="deckNoteWrap" style="width:100%;max-width:420px;margin-top:10px;display:none;">
        <textarea id="deckNoteField" placeholder="نکته‌ای برای یادآوری بنویس...">${escapeHtml(w.note||'')}</textarea>
      </div>
    </div>
    <div class="browse-bottom">
      <div class="browse-tools-row">
        <button class="btn btn-secondary btn-small" id="deckToolsBtn">🔗 دیکشنری و ابزارها</button>
        <button class="btn btn-secondary btn-small" id="deckAskAiBtn">🤖 دستیار هوشمند</button>
      </div>
      ${deckRevealed ? `
      <div class="browse-nav">
        <button class="btn" style="background:linear-gradient(180deg,var(--rust),var(--rust-dark));color:#fff8ef;flex:1;justify-content:center;" id="deckFailBtn">✗ بلد نبودم</button>
        <button class="btn btn-primary" id="deckPassBtn">✓ بلد بودم</button>
      </div>` : ''}
      <div class="browse-nav">
        <button class="btn btn-secondary" id="deckNextBtn" ${deckIndex>=deck.length-1?'disabled':''}>بعدی ▶</button>
        <button class="btn btn-secondary" id="deckPrevBtn" ${deckIndex===0?'disabled':''}>◀ قبلی</button>
      </div>
    </div>
  `;

  deckEl.querySelector('#deckCloseBtn').onclick = closeDeck;
  const revealBtn = deckEl.querySelector('#deckRevealBtn');
  if(revealBtn) revealBtn.onclick = ()=>{ deckRevealed=true; renderDeckCard(); };

  const noteToggle = deckEl.querySelector('#deckNoteToggle');
  if(noteToggle){
    noteToggle.onclick = ()=>{
      const wrap = deckEl.querySelector('#deckNoteWrap');
      wrap.style.display = wrap.style.display==='none' ? 'block' : 'none';
    };
  }
  const noteField = deckEl.querySelector('#deckNoteField');
  if(noteField){
    noteField.onblur = async ()=>{
      w.note = noteField.value.trim();
      await saveWords();
    };
  }
  deckEl.querySelector('#deckAskAiBtn').onclick = ()=> openAiPanel(w);
  deckEl.querySelector('#deckToolsBtn').onclick = ()=> openBrowseToolsPanel(w);
  deckEl.querySelector('#deckPrevBtn').onclick = ()=> deckGo(-1);
  deckEl.querySelector('#deckNextBtn').onclick = ()=> deckGo(1);
  const passBtn = deckEl.querySelector('#deckPassBtn');
  const failBtn = deckEl.querySelector('#deckFailBtn');
  if(passBtn) passBtn.onclick = ()=> deckGrade(true);
  if(failBtn) failBtn.onclick = ()=> deckGrade(false);
}

function openBrowseToolsPanel(w){
  const enQ = encodeURIComponent(w.en);
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="panel">
      <div class="panel-head">
        <h2>دیکشنری و ابزارها · <span class="en">${escapeHtml(w.en)}</span></h2>
        <button class="close-x">✕</button>
      </div>
      <div class="linkrow">
        <a class="link-btn" target="_blank" href="https://www.ldoceonline.com/dictionary/${enQ}"><span class="dot" style="background:#c0392b"></span>Longman</a>

        <a class="link-btn" target="_blank" href="https://www.google.com/search?q=${enQ}"><span class="dot" style="background:#4285f4"></span>جستجوی گوگل</a>
        <a class="link-btn" target="_blank" rel="noopener noreferrer" href="https://translate.google.com/m/translate?sl=en&tl=fa&q=${enQ}"><span class="dot" style="background:#34a853"></span>گوگل ترنسلیت</a>
        <a class="link-btn" target="_blank" rel="noopener noreferrer" href="https://chatgpt.com/?q=${encodeURIComponent('معنی، تلفظ و یک مثال کوتاه برای کلمه انگلیسی «'+w.en+'» را به فارسی توضیح بده.')}"><span class="dot" style="background:#10a37f"></span>پرسیدن در ChatGPT</a>
        <a class="link-btn" target="_blank" rel="noopener noreferrer" href="https://claude.ai/new?q=${encodeURIComponent('معنی، تلفظ و یک مثال کوتاه برای کلمه انگلیسی «'+w.en+'» را به فارسی توضیح بده.')}"><span class="dot" style="background:#c15f3c"></span>پرسیدن در Claude</a>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.close-x').onclick = ()=> overlay.remove();
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
}

/* ---------- AI settings panel ---------- */
function openSettingsPanel(){
  const s = loadAiSettings();
  const overlay = document.createElement('div');
  overlay.className='overlay';
  overlay.innerHTML = `
    <div class="panel">
      <div class="panel-head">
        <h2>تنظیمات دستیار هوش مصنوعی</h2>
        <button class="close-x">✕</button>
      </div>
      <div class="ai-note">
        از این برنامه خارج از Claude استفاده می‌کنید، پس دستیار به یک منبع پاسخ نیاز دارد. دو گزینه رایگان اضافه شده:<br>
        • <b>مدل محلی (کاملاً رایگان)</b>: یک مدل کوچک هوش مصنوعی مستقیماً داخل همین مرورگر شما اجرا می‌شود؛ به هیچ سروری وصل نمی‌شود، پس هیچ محدودیت جغرافیایی ندارد. اما دفعه اول باید حدود ۳۰۰ تا ۵۰۰ مگابایت دانلود کند، روی گوشی‌های ضعیف‌تر کند است، و کیفیت پاسخ به فارسی معمولاً پایین‌تر از سرویس‌های بزرگ است.<br>
        • <b>Google Gemini (رایگان با سهمیه روزانه)</b>: نیاز به یک کلید رایگان از aistudio.google.com دارد. برای شما تست‌شده و کار می‌کند.
      </div>
      <label>سرویس هوش مصنوعی</label>
      <select id="s-provider" style="width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--line);font-family:inherit;background:#fffef9;">
        <option value="local" ${s.provider==='local'?'selected':''}>مدل محلی — رایگان، اجرا در مرورگر</option>
        <option value="google" ${s.provider==='google'?'selected':''}>Google Gemini — رایگان با سهمیه روزانه</option>
      </select>
      <div id="s-keyWrap">
        <label>کلید API</label>
        <input type="text" class="en" id="s-key" placeholder="AIza... یا sk-..." value="${escapeHtml(s.key||'')}">
      </div>
      <div class="actions" style="margin-top:16px;">
        <button class="btn btn-primary" id="s-save">ذخیره</button>
        <button class="btn btn-ghost" id="s-clear">حذف کلید</button>
      </div>
      <div class="actions" style="margin-top:10px;">
        <button class="btn btn-ghost" id="s-clearModel">🗑 حذف مدل محلی دانلودشده از حافظه مرورگر</button>
      </div>
      <div id="s-clearModelMsg" style="font-size:12px;color:var(--ink-soft);margin-top:6px;"></div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.close-x').onclick = ()=> overlay.remove();
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };

  function syncKeyVisibility(){
    const p = overlay.querySelector('#s-provider').value;
    overlay.querySelector('#s-keyWrap').style.display = (p==='local') ? 'none' : 'block';
  }
  overlay.querySelector('#s-provider').addEventListener('change', syncKeyVisibility);
  syncKeyVisibility();

  overlay.querySelector('#s-save').onclick = ()=>{
    saveAiSettings({
      provider: overlay.querySelector('#s-provider').value,
      key: overlay.querySelector('#s-key').value.trim()
    });
    overlay.remove();
  };
  overlay.querySelector('#s-clear').onclick = ()=>{
    saveAiSettings({provider:'', key:''});
    overlay.remove();
  };
  overlay.querySelector('#s-clearModel').onclick = async ()=>{
    const msgEl = overlay.querySelector('#s-clearModelMsg');
    msgEl.textContent = 'در حال پاک کردن...';
    try{
      if('caches' in window){
        const names = await caches.keys();
        const targets = names.filter(n => /transformers|xenova|onnx/i.test(n));
        for(const n of targets) await caches.delete(n);
      }
      localGeneratorPromise = null; // force re-download next time it's used
      msgEl.textContent = 'مدل محلی از حافظه مرورگر پاک شد. دفعه بعد که از دستیار استفاده کنید، دوباره دانلود می‌شود.';
    }catch(e){
      msgEl.textContent = 'پاک‌سازی خودکار انجام نشد. راه مطمئن‌تر: تنظیمات مرورگر → حریم خصوصی → پاک کردن داده‌های سایت برای همین صفحه.';
    }
  };
}

/* ---------- Local in-browser model (fully free, no key, no server) ---------- */
let localGeneratorPromise = null;
function getLocalGenerator(onProgress){
  if(!localGeneratorPromise){
    localGeneratorPromise = (async ()=>{
      const { pipeline, env } = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2');
      env.allowLocalModels = false;
      return await pipeline('text-generation', 'Xenova/Qwen1.5-0.5B-Chat', { progress_callback: onProgress });
    })();
  }
  return localGeneratorPromise;
}

/* ---------- AI assistant (uses the user's own API key, or the free local model) ---------- */
function openAiPanel(word){
  const settings = loadAiSettings();
  const needsKey = settings.provider && settings.provider!=='local';
  const ready = settings.provider==='local' || (needsKey && settings.key);
  const overlay = document.createElement('div');
  overlay.className='overlay';
  overlay.innerHTML = `
    <div class="panel">
      <div class="panel-head">
        <h2>دستیار هوشمند · <span class="en">${escapeHtml(word.en)}</span></h2>
        <button class="close-x">✕</button>
      </div>
      ${!ready ? `<div class="ai-note">هنوز سرویسی انتخاب نکرده‌اید. از دکمه «تنظیمات هوش مصنوعی» بالای صفحه، یک گزینه (مثلاً «مدل محلی — رایگان») را انتخاب کنید.</div>` : ''}
      <div id="aiThread"></div>
      <textarea id="aiInput" placeholder="مثلاً: چند مثال دیگر با این کلمه بزن / تفاوتش با فلان کلمه چیه؟" ${!ready?'disabled':''}></textarea>
      <div class="actions" style="margin-top:12px;">
        <button class="btn btn-primary" id="aiAskBtn" ${!ready?'disabled':''}>پرسیدن</button>
        ${!ready ? `<button class="btn btn-secondary" id="aiSettingsShortcut">رفتن به تنظیمات</button>` : ''}
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.close-x').onclick = ()=> overlay.remove();
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
  const shortcutBtn = overlay.querySelector('#aiSettingsShortcut');
  if(shortcutBtn) shortcutBtn.onclick = ()=>{ overlay.remove(); openSettingsPanel(); };

  const thread = overlay.querySelector('#aiThread');
  const history = [];
  const systemPrompt = `تو یک دستیار آموزش زبان انگلیسی هستی. کاربر ایرانی است و در حال یادگیری کلمه انگلیسی "${word.en}" (معنی: ${word.fa}) است. پاسخ‌ها را به فارسی، کوتاه، روشن و کاربردی بده. در صورت نیاز مثال انگلیسی با ترجمه فارسی بیاور.`;

  async function callOpenAI(key){
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+key},
      body: JSON.stringify({
        model:'gpt-4o-mini',
        messages:[{role:'system', content: systemPrompt}, ...history]
      })
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    return (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || 'پاسخی دریافت نشد.';
  }

  

  

  async function callGemini(key){
    const contents = history.map(h=>({ role: h.role==='assistant'?'model':'user', parts:[{text:h.content}] }));
    const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=' + encodeURIComponent(key);
    const res = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        system_instruction: {parts:[{text: systemPrompt}]},
        contents
      })
    });
    if(!res.ok){
      let detail = '';
      try{ const errData = await res.json(); detail = errData.error && errData.error.message ? ' — ' + errData.error.message : ''; }catch(e){}
      throw new Error('HTTP '+res.status+detail);
    }
    const data = await res.json();
    const parts = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts;
    return (parts ? parts.map(p=>p.text||'').join('\n').trim() : '') || 'پاسخی دریافت نشد.';
  }

  async function callLocal(loadingId){
    const generator = await getLocalGenerator((p)=>{
      if(p && p.status==='progress'){
        const pct = p.progress ? Math.round(p.progress) : 0;
        const el = document.getElementById(loadingId);
        if(el) el.innerHTML = `<span class="spinner"></span> در حال دانلود مدل (${pct}٪) — فقط بار اول کمی طول می‌کشد...`;
      }
    });
    const el = document.getElementById(loadingId);
    if(el) el.innerHTML = `<span class="spinner"></span> در حال فکر کردن (روی همین گوشی/کامپیوتر شما)...`;
    const chatPrompt = `<|im_start|>system\n${systemPrompt}<|im_end|>\n`
      + history.map(h=>`<|im_start|>${h.role}\n${h.content}<|im_end|>\n`).join('')
      + `<|im_start|>assistant\n`;
    const out = await generator(chatPrompt, {max_new_tokens:220, temperature:0.7, do_sample:true, repetition_penalty:1.15});
    let text = out[0].generated_text;
    text = text.slice(chatPrompt.length);
    text = text.split('<|im_end|>')[0].trim();
    return text || 'پاسخی تولید نشد. دوباره تلاش کنید یا سوال را کوتاه‌تر بپرسید.';
  }

  async function ask(customPrompt){
    if(!ready) return;
    const input = overlay.querySelector('#aiInput');
    const userText = customPrompt || input.value.trim();
    if(!userText) return;
    input.value='';
    history.push({role:'user', content:userText});
    thread.innerHTML += `<div class="ai-msg user">${escapeHtml(userText)}</div>`;
    const loadingId = 'ld_'+Date.now();
    thread.innerHTML += `<div class="ai-msg" id="${loadingId}"><span class="spinner"></span> در حال فکر کردن...</div>`;
    thread.scrollTop = thread.scrollHeight;

    try{
      let text;
      if(settings.provider==='local') text = await callLocal(loadingId);
      else if(settings.provider==='google') text = await callGemini(settings.key);
      else text = await callOpenAI(settings.key);
      document.getElementById(loadingId).outerHTML = `<div class="ai-msg">${escapeHtml(text)}</div>`;
      history.push({role:'assistant', content:text});
    }catch(e){
      const msg = settings.provider==='local'
        ? `اجرای مدل محلی با مشکل مواجه شد (${escapeHtml(e.message||'')}). ممکن است حافظه دستگاه کافی نباشد یا اتصال اینترنت برای دانلود اولیه مدل قطع باشد.`
        : `درخواست ناموفق بود (${escapeHtml(e.message||'')}). محتمل‌ترین دلیل: نبود دسترسی به این سرویس از ایران بدون فیلترشکن، یا نامعتبر بودن کلید API.`;
      document.getElementById(loadingId).outerHTML = `<div class="ai-msg">${msg}</div>`;
    }
    thread.scrollTop = thread.scrollHeight;
  }

  overlay.querySelector('#aiAskBtn') && (overlay.querySelector('#aiAskBtn').onclick = ()=> ask());
  overlay.querySelector('#aiInput').addEventListener('keydown', (e)=>{
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); ask(); }
  });

  if(ready) ask(`لطفاً معنی، تلفظ تقریبی، و یک مثال کوتاه برای کلمه "${word.en}" بده.`);
}
